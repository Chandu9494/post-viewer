<mat-card [appearance]="'outlined'" class="post-viewer-card"
  [ngClass]="{ 'post-viewer-card__active': post?.id === selectedPostId }">
  <ng-container *ngIf="isLoading; else postContent">

    <div class="skeleton skeleton-image"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text short"></div>

  </ng-container>

  <ng-template #postContent>
    <mat-card-content *ngIf="post" class="post-viewer-card__content">
      <div class="post-viewer-card__image-wrapper" *ngIf="post?.imageUrl">
        <img *ngIf="post?.imageUrl" class="post-viewer-card__image" [src]="post.imageUrl"
          (error)="onImageError($event)" />
        <div class="post-viewer-card__actions">
          <button class="post-viewer-card__favourite-btn"
            [ngClass]="{ 'post-viewer-card__favourite-btn--active': isFavourite }" (click)="onFavouriteClick($event)"
            [attr.aria-label]="isFavourite ? 'Remove from favourites' : 'Add to favourites'">
            <mat-icon>{{ isFavourite ? 'favorite' : 'favorite_border' }}</mat-icon>
          </button>
          <button class="post-viewer-card__edit-btn" (click)="onEditClick($event)" aria-label="Edit post">
            <mat-icon>edit</mat-icon>
          </button>
        </div>
      </div>

      <div class="post-viewer-card__text-content">
        <h3 class="post-viewer-card__title">{{ post.title }}</h3>
        <p class="post-viewer-card__description">{{ post.body }}</p>
      </div>
    </mat-card-content>
  </ng-template>
</mat-card>
